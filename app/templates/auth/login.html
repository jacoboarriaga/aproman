{% extends 'base_auth.html' %}

{% block content %}
<form method="POST" action="{{ url_for('auth.login') }}">
    <div class="form-group">
        <label class="form-label">
            <img src="{{ url_for('static', filename='img/icons/usuario.png') }}" alt="Usuario" class="icon-sm">
            Usuario
        </label>
        <input type="text" name="username" class="auth-input" placeholder="Ej: pedro" required autofocus>
    </div>

    <div class="form-group">
        <label class="form-label">
            <img src="{{ url_for('static', filename='img/icons/lock.png') }}" alt="Contraseña" class="icon-sm">
            Contraseña
        </label>
        <input type="password" name="password" class="auth-input" placeholder="••••••••" required>
    </div>

    <button type="submit" class="btn-login">
        <img src="{{ url_for('static', filename='img/icons/lock.png') }}" alt="Acceder" class="icon-sm">
        Acceder al Sistema
    </button>
</form>
{% endblock %}
