{% extends 'base.html' %}
{% block title %}Editar Material Asignado - AproMan{% endblock %}

{% block content %}
<div class="dashboard-header">
    <h1 class="dashboard-title">
        <img src="{{ url_for('static', filename='img/icons/editar.png') }}" class="icon-lg mr-sm">
        Editar Asignación de Material
    </h1>
    <p class="dashboard-subtitle">
        Material: <strong>{{ asignacion.material_nombre }}</strong>
        <br>Sistema: <strong>{{ asignacion.sistema_nombre }}</strong>
    </p>
</div>

<div style="margin-bottom: var(--espaciado-lg); display: flex; gap: var(--espaciado-sm); flex-wrap: wrap;">
    <a href="{{ url_for('sistemas.ver_sistema', id=asignacion.sistema_id) }}" class="btn btn-outline">
        ← Volver al Sistema
    </a>
</div>

<div class="card card-form" style="max-width: 800px; margin: 0 auto;">
    <div class="card-body">
        <form method="POST" action="{{ url_for('sistemas.editar_asignacion_material', id=asignacion.id) }}">
            
            <div class="form-grid">
                <!-- Combobox Material -->
                <div class="div-form-group" style="grid-column: 1 / -1;">
                    <label class="label-required">Material Asignado *</label>
                    <select class="input-text" name="material_id" required>
                        {% for m in catalogo_materiales %}
                            <option value="{{ m.id }}" {% if asignacion.material_id == m.id %}selected{% endif %}>{{ m.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Toggle ¿Genera costo? (solo visual) -->
                <div class="div-form-group" style="grid-column: 1 / -1;">
                    <div style="
                        display: flex;
                        align-items: center;
                        gap: 12px;
                        padding: 12px 16px;
                        border-radius: var(--radio-md, 8px);
                    ">
                        <!-- Switch toggle -->
                        <label class="toggle-switch" style="position:relative; display:inline-block; width:44px; height:24px; flex-shrink:0;">
                            <input type="checkbox" id="genera_costo" name="genera_costo" value="1"
                                   {% if asignacion.costo_material is not none %}checked{% endif %}
                                   style="opacity:0; width:0; height:0;"
                                   onchange="toggleCostoFields(this)">
                            <span style="
                                position:absolute; cursor:pointer; inset:0;
                                background: #cbd5e1;
                                border-radius: 24px;
                                transition: background 0.25s;
                            " id="toggle-track"></span>
                            <span style="
                                position:absolute; cursor:pointer;
                                content:'';
                                height:18px; width:18px;
                                left:3px; top:3px;
                                background: white;
                                border-radius: 50%;
                                transition: transform 0.25s;
                                box-shadow: 0 1px 3px rgba(0,0,0,.2);
                            " id="toggle-thumb"></span>
                        </label>
                        <label for="genera_costo" style="cursor:pointer; font-weight:600; margin:0; user-select:none;">
                            ¿Genera costo?
                        </label>
                        <span id="toggle-badge" style="
                            font-size: 0.75rem;
                            padding: 2px 10px;
                            border-radius: 99px;
                            background: #e2e8f0;
                            color: #64748b;
                            font-weight: 600;
                            transition: all 0.25s;
                        ">No</span>
                    </div>
                </div>

                <!-- Campos de costo (ocultos por defecto si no hay costo) -->
                <div id="campos-costo"
                     style="display:none; grid-column: 1 / -1; grid-template-columns: 1fr 2fr; gap: var(--espaciado-md);">

                    <!-- Costo del material -->
                    <div class="div-form-group">
                        <label class="label-required" for="costo_material">Costo del Material *</label>
                        <input type="number" id="costo_material" name="costo_material"
                               value="{{ asignacion.costo_material if asignacion.costo_material is not none else '' }}"
                               class="input-text" step="0.01" min="0" placeholder="0.00"
                               style="text-align: right;">
                    </div>

                    <!-- Descripción del costo -->
                    <div class="div-form-group">
                        <label class="label-required" for="descripcion_costo">Descripción del Costo *</label>
                        <input type="text" id="descripcion_costo" name="descripcion"
                               value="{{ asignacion.descripcion or '' }}"
                               class="input-text" maxlength="200"
                               placeholder="Ej. Compra directa a proveedor">
                    </div>
                </div>


                <div class="div-form-group" style="grid-column: 1 / -1;">
                    <label>Fecha de Registro</label>
                    <input class="input-text" type="text" readonly value="{{ asignacion.fecha_formateada }}">
                </div>
            </div>

            <div class="form-actions" style="margin-top: var(--espaciado-lg); display: flex; justify-content: flex-end;">
                
                <div style="flex-grow: 1;"></div>
                
                <button type="submit" name="accion" value="eliminar" class="btn btn-error" onclick="return confirm('¿Estás seguro de que deseas retirar este material del sistema?');" style="margin-right: 10px;">
                    <img src="{{ url_for('static', filename='img/icons/eliminar-blanco.png') }}" class="icon-sm mr-xs">
                    Retirar Material
                </button>
                
                <button type="submit" name="accion" value="guardar" class="btn btn-primary">
                    <img src="{{ url_for('static', filename='img/icons/disco-blanco.png') }}" class="icon-sm mr-xs">
                    Guardar Cambios
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    function toggleCostoFields(checkbox) {
        var container  = document.getElementById('campos-costo');
        var inputCosto = document.getElementById('costo_material');
        var inputDesc  = document.getElementById('descripcion_costo');
        var track      = document.getElementById('toggle-track');
        var thumb      = document.getElementById('toggle-thumb');
        var badge      = document.getElementById('toggle-badge');

        if (checkbox.checked) {
            container.style.display = 'grid';
            inputCosto.required = true;
            inputDesc.required  = true;
            track.style.background = 'var(--color-primario, #4f46e5)';
            thumb.style.transform  = 'translateX(20px)';
            badge.style.background = '#e0e7ff';
            badge.style.color      = '#4f46e5';
            badge.textContent      = 'Sí';
        } else {
            container.style.display = 'none';
            inputCosto.required = false;
            inputDesc.required  = false;
            inputCosto.value    = '';
            inputDesc.value     = '';
            track.style.background = '#cbd5e1';
            thumb.style.transform  = 'translateX(0)';
            badge.style.background = '#e2e8f0';
            badge.style.color      = '#64748b';
            badge.textContent      = 'No';
        }
    }

    // Inicializar estado al cargar la página
    window.onload = function() {
        toggleCostoFields(document.getElementById('genera_costo'));
    };
</script>
{% endblock %}
